<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Exemplo de Formulário</h1>
    <form action="cadastro.php" method="post" autocomplete="on">
        
        <p>
            <label for="icor">Cor Favorita:</label>
            <input type="color" id="icor" name="cor" value="#ff00ff">
        </p>
        <p>
            <label for="inivel">Nivel:</label>
            <input type="range" id="inivel" name="nivel" min="1" max="10">
        </p>
        
        <p>
            <label for="iarquivo">Enviar um arquivo:</label>
            <input type="file" id="iarquivo" name="arquivo">
        </p>
        <p>
            <input type="submit" value="Enviar">
            <input type="reset" value="Limpar">
        </p>
    </form>
</body>
</html>

<!DOCTYPE html>
<html lang= "pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Teste de formulario</h1>
    <form action="cadastro.php" method="post" autocomplete="on">
        <p>
            <!-- o label é usado para descrever o input e o 'for' deve ter o mesmo valor do 'id' do input -->

            <label for="iusu">Usuário:</label> 
            <input type="text" 
            name="usu" 
            id="iusu" 
            required 
            minlength="5" 
            maxlength="15" 
            size="15" 
            placeholder="minimo de 15 letras" autocomplete="username">
        </p>
        <p>
            <!-- required torna obrigatorio o input e o min/maxlenght o numero de caracteres dentro do input-->

            <label for="isenha">Senha:</label>
            <input type="password" 
            name="senha" 
            id="isenha" 
            required 
            minlength="8" 
            size="8" 
            placeholder="bota a senha bro" 
            autocomplete="current-password">
        </p>
        <input type="reset" value="Limpar">
        <input type="submit" value="Enviar">
    </form>




</body>
</html>

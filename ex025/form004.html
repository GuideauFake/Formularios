<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>exemplo de formulário</h1>
    <form action="cadastro.php" method="get" autocomplete="on">
        <fieldset>
            <legend style="text-align: center;">Dados Pessoais</legend>
            <p>
                <label for="iname">Nome:</label>
                <input type="text" name="nome" id="iname" required minlength="30" placeholder="Nome Completo">
            </p>
            <p>
                <label for="iemail">Email:</label>
                <input type="email" name="email" id="iemail" required placeholder="Digite seu email" autocomplete="email">
            </p>
            <p>
                <label for="itel">Telefone:</label>
                <input type="tel" name="tel" id="itel" required placeholder="Digite seu telefone" autocomplete="tel">
            </p>
        </fieldset>
            <input type="submit" value="Enviar">
            <input type="reset" value="Limpar">
    
    </form>



</body>
</html>

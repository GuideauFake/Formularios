<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flex Box</title>
    <style>
        .container{
            display: flex;
            flex-flow: row wrap;

            
            background-color: blueviolet;

        }

        .item{
            flex-shrink: 1;
            flex-grow: 0;
            flex-basis: 150px;

            background-color: white;
            border: 1px solid black;
            text-align: center;
         
        }
        
    </style>
</head>
<body>
    <div class="container">
        <div class="item" id="i1">A</div>
        <div class="item" id="i2">B</div>
        <div class="item" id="i3">C</div>
        <div class="item" id="i3">D</div>
        <div class="item" id="i3">E</div>
        <div class="item" id="i3">F</div>
        <div class="item" id="i3">G</div>
        <div class="item" id="i3">H</div>
        <div class="item" id="i3">I</div>
        <div class="item" id="i3">J</div>
        <div class="item" id="i3">K</div>
        <div class="item" id="i3">L</div>
        <div class="item" id="i3">M</div>
        <div class="item" id="i3">N</div>
    </div>
</body>
</html>
